# hypridle idle management daemon

general {
    lock_cmd = pidof hyprlock || hyprlock                                                   # avoid starting multiple hyprlock instances.
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'                 # to avoid having to press a key twice to turn on the display.
}                         
# turn off screen faster if session is already locked
listener {
    timeout = 60                                                                            # 1 min
    on-timeout = pidof hyprlock && hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'   # screen off when timeout has passed
    on-resume = pidof hyprlock && hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'     # screen on when activity is detected after timeout has fired.
}
listener {
    timeout = 1800                                                                          # 30 min
    on-timeout = loginctl lock-session                                                      # lock screen when timeout has passed
}
listener {
    timeout = 1860                                                                          # 31 min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'                     # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'                       # screen on when activity is detected after timeout has fired.
}
